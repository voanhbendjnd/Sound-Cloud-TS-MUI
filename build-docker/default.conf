server {
    listen 80;

    # 1. Điều hướng các request /api sang Spring Boot Backend
    location /api {
        proxy_pass http://backend-soundcloud:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        # CỰC KỲ QUAN TRỌNG: Giúp Spring Boot biết IP thật của Client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # 2. Điều hướng các request còn lại sang Frontend Next.js
    location / {
        proxy_pass http://frontend-nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        # CỰC KỲ QUAN TRỌNG: Để NextAuth không bị lỗi Decryption/401
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}